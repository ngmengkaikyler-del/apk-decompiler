name: Decompile APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Java
      run: sudo apt-get install openjdk-11-jdk -y

    - name: Download APK
      run: wget "https://drive.google.com/uc?export=download&id=1-BTwkTg-deXJNDhAdHvlFt9aKKe76DUe" -O game.apk

    - name: Download apktool
      run: wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar

    - name: Decompile
      run: java -jar apktool.jar d game.apk -o output

    - name: Upload files
      uses: actions/upload-artifact@v4
      with:
        name: result
        path: output
